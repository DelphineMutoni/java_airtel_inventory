<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Assets</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-4">

    <h2 class="mb-3">Inventory Management System</h2>

    <!-- NAV BUTTONS -->
    <a href="/showNewAssetForm" class="btn btn-success mb-3">
        Add Asset
    </a>

    <a href="/dashboard" class="btn btn-primary mb-3">
        Dashboard
    </a>

    <!-- TABLE -->
    <table class="table table-bordered table-hover">

        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Asset Code</th>
            <th>Device Type</th>
            <th>Brand</th>
            <th>Assigned To</th>
            <th>Status</th>
            <th>Action</th>
        </tr>
        </thead>

        <tbody>

        <tr th:each="asset : ${listAssets}">

            <td th:text="${asset.id}"></td>
            <td th:text="${asset.assetCode}"></td>
            <td th:text="${asset.deviceType}"></td>
            <td th:text="${asset.brand}"></td>

            <!-- ASSIGNED TO -->
            <td th:text="${asset.assignedTo != null ? asset.assignedTo : 'Not Assigned'}"></td>

            <!-- STATUS (FIXED + COLOR) -->
            <td>
                <span th:text="${asset.status}"
                      th:classappend="${asset.status == 'Available'} ? 'text-success' : 
                                      (asset.status == 'Assigned' ? 'text-danger' : 'text-warning')">
                </span>
            </td>
            <td>
    <!-- EDIT -->
    <a th:href="@{/edit/{id}(id=${asset.id})}" 
       class="btn btn-primary btn-sm">
        Edit
    </a>

    <!-- DELETE -->
    <a th:href="@{/deleteAsset/{id}(id=${asset.id})}" 
       class="btn btn-danger btn-sm"
       onclick="return confirm('Are you sure you want to delete this asset?')">
        Delete
    </a>
</td>
			

        </tr>

        </tbody>

    </table>

</div>

</body>
</html>
