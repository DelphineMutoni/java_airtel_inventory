<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Add Asset</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-4">

    <h2>Add New Asset</h2>

    <form th:action="@{/saveAsset}" th:object="${asset}" method="post">

        <div class="mb-3">
            <label>Asset Code</label>
            <input type="text" class="form-control" th:field="*{assetCode}" required>
        </div>

        <div class="mb-3">
            <label>Device Type</label>
            <input type="text" class="form-control" th:field="*{deviceType}" required>
        </div>

        <div class="mb-3">
            <label>Brand</label>
            <input type="text" class="form-control" th:field="*{brand}" required>
        </div>

        <div class="mb-3">
            <label>Model</label>
            <input type="text" class="form-control" th:field="*{model}">
        </div>

        <div class="mb-3">
            <label>Assigned To</label>
            <input type="text" class="form-control" th:field="*{assignedTo}">
        </div>

        <div class="mb-3">
            <label>Status</label>
            <select class="form-control" th:field="*{status}">
                <option>Available</option>
                <option>Assigned</option>
                <option>Damaged</option>
            </select>
        </div>

        <button type="submit" class="btn btn-success">Save Asset</button>
        <a href="/assets" class="btn btn-secondary">Back</a>

    </form>

</div>

</body>
</html>
