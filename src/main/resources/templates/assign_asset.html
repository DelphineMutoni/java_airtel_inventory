<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<title>Assign Asset</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-4">

<h2>Issue Asset</h2>

<form th:action="@{/assignAsset}" th:object="${assignment}" method="post">

<input type="text" class="form-control mb-2" th:field="*{assetId}" placeholder="Asset ID">

<input type="text" class="form-control mb-2" th:field="*{employeeName}" placeholder="Employee Name">

<input type="text" class="form-control mb-2" th:field="*{department}" placeholder="Department">

<button class="btn btn-primary">Assign</button>

</form>

</div>

</body>
</html>
