<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5" style="max-width: 400px;">

    <h3 class="text-center mb-4">Inventory Login</h3>

    <form action="/login" method="post">

        <div class="mb-3">
            <label>Username</label>
            <input type="text" name="username" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Password</label>
            <input type="password" name="password" class="form-control" required>
        </div>

        <button class="btn btn-primary w-100">Login</button>

        <p class="text-danger mt-3" th:text="${error}"></p>

    </form>

    <!-- DEVELOPERS INFO SECTION -->

        <div class="card-header bg-dark text-white text-center">
            System Developers
        </div>

        <div class="card-body text-center">

            <p class="mb-1"><strong>Irakoze Pacifique</strong> (24rp01507)</p>
            <p class="mb-3"><strong>Mutoni Delphine</strong> (24rp01217)</p>

            <hr>

            <p class="mb-1"><strong>Login Credentials (SysAdmin)</strong></p>
            <p>Username: <b>24rp01507</b></p>
            <p>Password: <b>24rp01217</b></p>

        </div>
    </div>

</div>

</body>
</html>
